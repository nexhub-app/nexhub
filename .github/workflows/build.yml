# =============================================================================
# NexHub 自动打包 + 发布工作流（v9 — Windows 固定 windows-2022 镜像，修 VS2019 生成器误选）
# -----------------------------------------------------------------------------
# 触发：推送 v* 标签自动发布；也支持网页手动 Run workflow 试跑。
#
# 修复记录：
#   v1: 初始版（全部失败：flutter pub get exit code 1）
#   v2: 尝试 flutter-action@v3 → **v3 不存在**，4 个 job 全部 Unable to resolve action
#   v3: 改回 subosito/flutter-action@v2，固定 Flutter 3.32.0，加 --verbose；
#       并修复 intl ^0.19.0→^0.20.2（匹配 flutter_localizations 要求）
#   v4: 修复 d0537c9 误回退 intl 到 ^0.19.0（重新锁定 ^0.20.2）；
#       四个编译 job 在 build 前显式 flutter gen-l10n
#   v5: 移除 ilammy/msvc-dev-cmd@v1（误诊：移除后仍是 "Visual Studio 16 2019" 生成器报错）
#   v6: 加回 ilammy/msvc-dev-cmd@v1 固定 VS2022（vs-version: '[17,18)'）——
#       **实测仍失败**：Flutter 3.32 用自身 vswhere 选生成器，ilammy 的环境变量
#       未能覆盖其生成器偏好，Windows job 依旧报 "Visual Studio 16 2019 ... not found"
#   v7: Linux job 链接期缺原生库修复：扩充 apt（X11/GL/ALSA/Pulse 等）；
#       加诊断(precache/doctor)与健壮性(clean 先于 pub get、pub get 重试、build tee)
#   v8: Release 发布页正文为空修复：release job 加 actions/checkout + allowUpdates: true
#   v9（当前）：
#     - **Windows CMake "Visual Studio 16 2019 could not find any instance of Visual Studio"
#       根因定案**：Flutter 3.32.0 在 windows-latest 镜像上误选了残缺的 VS2019 生成器。
#       ilammy 固定 VS2022（v6）未能覆盖 Flutter 自身 vswhere 的生成器选择，故无效。
#     - **最终修复**：Windows runner 由 windows-latest 固定为 **windows-2022**
#       （该镜像的 VS2022 + Windows SDK 与 Flutter 3.32 期望一致，生成器自动选对），
#       并移除 ilammy/msvc-dev-cmd@v1 步骤。其余桌面 job 桌面支持与 gen-l10n 保持不变。
#     - 注：用户曾粘贴过 "AppLocalizations/flutter_gen 缺失" 的 Summary，与本次实际
#       Windows VS2019 报错并非同一错误；gen-l10n 已在 v4 起每个编译 job 显式执行，可忽略。
# =============================================================================

name: Build & Release NexHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 生成多语言文件 (gen-l10n)
        run: flutter gen-l10n 2>&1
      - name: 编译 APK
        run: flutter build apk --release --verbose 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 启用 Windows 桌面支持
        run: flutter config --enable-windows-desktop
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 生成多语言文件 (gen-l10n)
        run: flutter gen-l10n 2>&1
      - name: 编译 Windows
        run: flutter build windows --release --verbose 2>&1
      - name: 打包 Windows 安装文件
        run: Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "NexHub-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: NexHub-windows-x64.zip
          if-no-files-found: error

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Linux 编译依赖（更完整）
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libasound2-dev libxss1 libpulse-dev \
            libglu1-mesa-dev libgl1-mesa-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 启用 Linux 桌面支持
        run: flutter config --enable-linux-desktop
      - name: Flutter 环境与诊断 (debug)
        run: |
          echo "FLUTTER_ROOT: ${FLUTTER_ROOT:-<unset>}"
          flutter --version
          flutter doctor -v || true
          uname -a
          lsb_release -a || true
      - name: Precache Flutter Linux 产物
        run: flutter precache --linux
      - name: 清理旧缓存（置于 pub get 之前，安全）
        run: flutter clean || true
      - name: 获取依赖 (verbose + 重试)
        run: |
          set -eux
          if flutter pub get; then
            echo "pub get succeeded"
          else
            echo "pub get 失败，改用 verbose 输出重试..."
            flutter pub get --verbose > pubget.log 2>&1 || true
            tail -n 500 pubget.log
            exit 1
          fi
      - name: 生成多语言文件 (gen-l10n)
        run: flutter gen-l10n 2>&1
      - name: 编译 Linux (verbose + 日志)
        run: |
          set -o pipefail
          flutter build linux --release --verbose 2>&1 | tee flutter_build.log || { tail -n 500 flutter_build.log; exit 1; }
      - name: 打包 Linux 安装文件
        run: tar -czf NexHub-linux-x64.tar.gz -C build/linux/x64/release bundle
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: NexHub-linux-x64.tar.gz
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 启用 macOS 桌面支持
        run: flutter config --enable-macos-desktop
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 生成多语言文件 (gen-l10n)
        run: flutter gen-l10n 2>&1
      - name: 编译 macOS
        run: flutter build macos --release --verbose 2>&1
      - name: 打包 macOS 安装文件
        run: |
          APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1)
          echo "找到 App: $APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" NexHub-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: NexHub-macos.zip
          if-no-files-found: error

  release:
    name: 发布到 GitHub Releases
    needs: [android, windows, linux, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexHub ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          allowUpdates: true
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/windows-build/NexHub-windows-x64.zip
            artifacts/linux-build/NexHub-linux-x64.tar.gz
            artifacts/macos-build/NexHub-macos.zip
