# =============================================================================
# NexHub 自动打包 + 发布工作流（v5 — 移除 ilammy/msvc-dev-cmd 修复 Windows CMake 找不到 VS）
# -----------------------------------------------------------------------------
# 触发：推送 v* 标签自动发布；也支持网页手动 Run workflow 试跑。
#
# 修复记录：
#   v1: 初始版（全部失败：flutter pub get exit code 1）
#   v2: 尝试 flutter-action@v3 → **v3 不存在**，4 个 job 全部 Unable to resolve action
#   v3: 改回 subosito/flutter-action@v2，固定 Flutter 3.32.0，加 --verbose；
#       并修复 intl ^0.19.0→^0.20.2（匹配 flutter_localizations 要求）
#   v4: 修复 d0537c9 误回退 intl 到 ^0.19.0（重新锁定 ^0.20.2）；
#       四个编译 job 在 build 前显式 flutter gen-l10n
#   v5（当前）：
#     - **移除 ilammy/msvc-dev-cmd@v1**：该 Action 默认只在 VS2017/2019 范围找编译器，
#       在 windows-latest（只有 VS2022）上会让 CMake 误用 "Visual Studio 16 2019"
#       生成器并报 "could not find any instance of Visual Studio"。
#       改为依赖 Flutter 自带 vswhere 自动探测 windows-latest 的 VS2022（标准做法）。
#     - 三个桌面平台 job 在依赖获取前显式开启桌面支持：
#       windows → flutter config --enable-windows-desktop
#       linux   → flutter config --enable-linux-desktop
#       macos   → flutter config --enable-macos-desktop
#     - upload-artifact 加 if-no-files-found: error
# =============================================================================

name: Build & Release NexHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 生成多语言文件 (gen-l10n)
        run: flutter gen-l10n 2>&1
      - name: 编译 APK
        run: flutter build apk --release --verbose 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 启用 Windows 桌面支持
        run: flutter config --enable-windows-desktop
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 生成多语言文件 (gen-l10n)
        run: flutter gen-l10n 2>&1
      - name: 编译 Windows
        run: flutter build windows --release --verbose 2>&1
      - name: 打包 Windows 安装文件
        run: Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "NexHub-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: NexHub-windows-x64.zip
          if-no-files-found: error

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Linux 编译依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 启用 Linux 桌面支持
        run: flutter config --enable-linux-desktop
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 生成多语言文件 (gen-l10n)
        run: flutter gen-l10n 2>&1
      - name: 编译 Linux
        run: flutter build linux --release --verbose 2>&1
      - name: 打包 Linux 安装文件
        run: tar -czf NexHub-linux-x64.tar.gz -C build/linux/x64/release bundle
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: NexHub-linux-x64.tar.gz
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 启用 macOS 桌面支持
        run: flutter config --enable-macos-desktop
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 生成多语言文件 (gen-l10n)
        run: flutter gen-l10n 2>&1
      - name: 编译 macOS
        run: flutter build macos --release --verbose 2>&1
      - name: 打包 macOS 安装文件
        run: |
          APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1)
          echo "找到 App: $APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" NexHub-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: NexHub-macos.zip
          if-no-files-found: error

  release:
    name: 发布到 GitHub Releases
    needs: [android, windows, linux, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexHub ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/windows-build/NexHub-windows-x64.zip
            artifacts/linux-build/NexHub-linux-x64.tar.gz
            artifacts/macos-build/NexHub-macos.zip
