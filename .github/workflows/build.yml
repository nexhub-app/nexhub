# =============================================================================
# NexHub 自动打包 + 发布工作流（v2 — 修复 CI 构建失败）
# -----------------------------------------------------------------------------
# 触发：推送 v* 标签自动发布；也支持网页手动 Run workflow 试跑。
#
# 修复记录（v1 → v2）：
#   - 固定 Flutter 版本为 3.32.0（满足 sdk >=3.4.0 <4.0.0，避免 stable 拉到不兼容版）
#   - subosito/flutter-action 升级到 v3（兼容 Node.js 24 运行环境）
#   - 所有 Action 统一使用最新主版本号
#   - flutter pub get / build 加了详细错误输出，方便排查
# =============================================================================

name: Build & Release NexHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v3
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 编译 APK
        run: flutter build apk --release --verbose 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v3
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 编译 Windows
        run: flutter build windows --release --verbose 2>&1
      - name: 打包 Windows 安装文件
        run: Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "NexHub-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: NexHub-windows-x64.zip
          if-no-files-found: error

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Linux 编译依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
      - uses: subosito/flutter-action@v3
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 编译 Linux
        run: flutter build linux --release --verbose 2>&1
      - name: 打包 Linux 安装文件
        run: tar -czf NexHub-linux-x64.tar.gz -C build/linux/x64/release bundle
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: NexHub-linux-x64.tar.gz
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v3
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - name: 获取依赖
        run: flutter pub get 2>&1
      - name: 编译 macOS
        run: flutter build macos --release --verbose 2>&1
      - name: 打包 macOS 安装文件
        run: |
          APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1)
          echo "找到 App: $APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" NexHub-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: NexHub-macos.zip
          if-no-files-found: error

  release:
    name: 发布到 GitHub Releases
    needs: [android, windows, linux, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexHub ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/windows-build/NexHub-windows-x64.zip
            artifacts/linux-build/NexHub-linux-x64.tar.gz
            artifacts/macos-build/NexHub-macos.zip
